name: Pipeline Inteligente

on:
  workflow_dispatch:

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Criar arquivos
        run: |
          mkdir -p saida_build
          echo "Relatório 1" > saida_build/relatorio1.txt
          echo "Relatório 2" > saida_build/relatorio2.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: artifacts

      - name: Listar arquivos
        run: ls -R artifacts

      - name: Ler arquivo
        run: cat artifacts/relatorio1.txt