name: Pipeline Inteligente

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'

  push:
    branches:
      - 'feature/*'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  teste:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gerar relatório
        run: |
          echo "OK" > relatorio.txt

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: relatorio
          path: relatorio.txt
