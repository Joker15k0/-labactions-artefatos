name: Pipeline Inteligente

on:
  workflow_dispatch:

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Criar arquivos de relatório
        run: |
          mkdir -p saida_build
          echo "Relatório 1" > saida_build/relatorio1.txt
          echo "Relatório 2" > saida_build/relatorio2.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Listar arquivos
        run: ls -R

      - name: Ler relatorio1
        run: cat relatorio1.txt