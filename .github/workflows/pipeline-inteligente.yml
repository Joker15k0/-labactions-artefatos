name: Pipeline Inteligente

on:
  workflow_dispatch:

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Criar pasta de build e relatórios
        run: |
          mkdir -p saida_build
          echo "Relatório 1 gerado" > saida_build/relatorio1.txt
          echo "Relatório 2 gerado" > saida_build/relatorio2.txt

      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/